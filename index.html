<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Work Receipt Generator</title>
<meta name="description" content="Generate professional work receipts with photo documentation">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .gradient-bg {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .file-input {
    position: relative;
    overflow: hidden;
    display: inline-block;
    cursor: pointer;
  }
  .file-input input[type=file] {
    position: absolute;
    left: -9999px;
  }
  .image-preview {
    max-width: 200px;
    max-height: 150px;
    object-fit: cover;
    border-radius: 8px;
  }
</style>
</head>

<body class="bg-gray-50 min-h-screen">

<div class="gradient-bg py-8">
  <div class="max-w-lg mx-auto px-4">
    <h1 class="text-3xl font-bold text-white text-center mb-2">Professional Receipt Generator</h1>
    <p class="text-blue-100 text-center mb-8">Create professional work documentation with photo evidence</p>
    
    <div class="bg-white p-6 rounded-2xl shadow-xl">
      <!-- Image Upload Section -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">📸 Work Photo Evidence</label>
        <div class="file-input w-full">
          <label for="imageInput" class="w-full bg-blue-50 border-2 border-dashed border-blue-300 rounded-lg p-4 text-center cursor-pointer hover:bg-blue-100 transition-colors block">
            <div id="imagePreviewContainer" class="hidden">
              <img id="imagePreview" class="image-preview mx-auto mb-2">
              <p class="text-sm text-gray-600">Click to change photo</p>
            </div>
            <div id="imageUploadPrompt">
              <svg class="mx-auto h-12 w-12 text-blue-400 mb-2" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <p class="text-sm text-gray-600">Click to take or upload a photo</p>
            </div>
          </label>
          <input type="file" accept="image/*" capture="environment" id="imageInput">
        </div>
      </div>

      <!-- Form Fields -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Job Title *</label>
          <input id="title" placeholder="e.g., Plumbing Repair, Website Design"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Work Description *</label>
          <textarea id="desc" placeholder="Detailed description of work completed..."
            rows="4" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Client Name *</label>
          <input id="client" placeholder="Client or company name"
            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="mt-6 space-y-3">
        <button onclick="previewReceipt()"
          class="w-full bg-gray-600 hover:bg-gray-700 text-white py-3 px-4 rounded-lg font-semibold transition-colors">
          📋 Preview Receipt
        </button>

        <button onclick="generatePDF()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-lg font-semibold transition-colors">
          📄 Generate & Share PDF
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div id="preview" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-xl w-full max-w-2xl max-h-screen overflow-y-auto">
    <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center">
      <h2 class="text-xl font-bold text-gray-900">Receipt Preview</h2>
      <button onclick="closePreview()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg transition-colors">
        ✕ Close
      </button>
    </div>
    <div id="previewContent" class="p-6"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let imageData = null;

// Handle image upload
document.getElementById("imageInput").addEventListener("change", function(e){
  if (e.target.files && e.target.files[0]) {
    const reader = new FileReader();
    reader.onload = function(ev){
      imageData = ev.target.result;
      
      // Show image preview
      const imagePreview = document.getElementById("imagePreview");
      const imagePreviewContainer = document.getElementById("imagePreviewContainer");
      const imageUploadPrompt = document.getElementById("imageUploadPrompt");
      
      imagePreview.src = imageData;
      imagePreviewContainer.classList.remove("hidden");
      imageUploadPrompt.classList.add("hidden");
    };
    reader.readAsDataURL(e.target.files[0]);
  }
});

function validateForm() {
  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const client = document.getElementById("client").value.trim();
  
  if (!title || !desc || !client) {
    alert("Please fill in all required fields (marked with *)");
    return false;
  }
  return true;
}

function generateReceiptNumber() {
  const timestamp = Date.now().toString(36);
  const random = Math.random().toString(36).substr(2, 5);
  return `WR-${timestamp}-${random}`.toUpperCase();
}

function getCurrentDate() {
  const now = new Date();
  return now.toLocaleDateString('en-US', {
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
}

function createReceiptHTML() {
  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const client = document.getElementById("client").value.trim();
  const receiptNumber = generateReceiptNumber();
  const serviceDate = getCurrentDate();
  
  return `
    <div class="max-w-2xl mx-auto bg-white rounded-lg overflow-hidden shadow-lg">
      <!-- Header -->
      <div class="bg-gradient-to-br from-blue-600 to-purple-700 text-white p-6">
        <div class="flex justify-between items-start">
          <div>
            <h1 class="text-2xl font-bold">WORK RECEIPT</h1>
            <p class="text-blue-100 mt-1">Professional Service Documentation</p>
          </div>
          <div class="text-right">
            <div class="bg-white bg-opacity-20 rounded-lg p-3">
              <p class="text-sm font-medium">Receipt #</p>
              <p class="font-mono text-lg">${receiptNumber}</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="p-6">
        <!-- Service Info -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
          <div class="space-y-3">
            <div>
              <label class="text-sm font-medium text-gray-600 uppercase tracking-wide">Service Date</label>
              <p class="text-lg font-semibold text-gray-900">${serviceDate}</p>
            </div>
            <div>
              <label class="text-sm font-medium text-gray-600 uppercase tracking-wide">Client Name</label>
              <p class="text-lg font-semibold text-gray-900">${client}</p>
            </div>
          </div>
          <div class="space-y-3">
            <div>
              <label class="text-sm font-medium text-gray-600 uppercase tracking-wide">Service Provider</label>
              <p class="text-lg font-semibold text-gray-900">Professional Services</p>
            </div>
            <div>
              <label class="text-sm font-medium text-gray-600 uppercase tracking-wide">Status</label>
              <span class="inline-block bg-green-100 text-green-800 text-sm font-medium px-3 py-1 rounded-full">Completed</span>
            </div>
          </div>
        </div>

        <div style="border-top: 2px dashed #e5e7eb; margin: 1rem 0;"></div>

        <!-- Service Details -->
        <div class="mb-6">
          <label class="text-sm font-medium text-gray-600 uppercase tracking-wide block mb-2">Service Title</label>
          <h2 class="text-xl font-bold text-gray-900 mb-4">${title}</h2>
          
          <label class="text-sm font-medium text-gray-600 uppercase tracking-wide block mb-2">Work Description</label>
          <div class="bg-gray-50 p-4 rounded-lg">
            <p class="text-gray-700 leading-relaxed">${desc}</p>
          </div>
        </div>

        ${imageData ? `
        <div class="mb-6">
          <div style="border-top: 2px dashed #e5e7eb; margin: 1rem 0;"></div>
          <label class="text-sm font-medium text-gray-600 uppercase tracking-wide block mb-3">Photographic Evidence</label>
          <div class="bg-gray-50 p-4 rounded-lg text-center">
            <img src="${imageData}" alt="Work Evidence" class="max-w-full max-h-80 object-contain mx-auto rounded-lg shadow-md">
            <p class="text-xs text-gray-500 mt-2">Documentation of completed work</p>
          </div>
        </div>
        ` : ''}

        <div style="border-top: 2px dashed #e5e7eb; margin: 1rem 0;"></div>

        <!-- Footer -->
        <div class="text-center pt-4">
          <p class="text-sm text-gray-500 mb-2">Thank you for choosing our professional services</p>
          <div class="flex justify-center space-x-4 text-xs text-gray-400">
            <span>Quality • Reliability • Excellence</span>
          </div>
          <div class="mt-4 pt-4 border-t border-gray-200">
            <p class="text-xs text-gray-400">
              This receipt serves as proof of service completion and quality assurance.
            </p>
          </div>
        </div>
      </div>
    </div>
  `;
}

function previewReceipt(){
  if (!validateForm()) {
    return;
  }

  document.getElementById("previewContent").innerHTML = createReceiptHTML();
  document.getElementById("preview").classList.remove("hidden");
}

function closePreview(){
  document.getElementById("preview").classList.add("hidden");
}

async function generatePDF(){
  if (!validateForm()) {
    return;
  }

  const { jsPDF } = window.jspdf;
  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const client = document.getElementById("client").value.trim();
  const receiptNumber = generateReceiptNumber();
  const serviceDate = getCurrentDate();

  const doc = new jsPDF();
  
  // Set up fonts and colors
  doc.setFont("helvetica", "bold");
  doc.setFontSize(20);
  doc.setTextColor(40, 40, 40);
  
  // Header
  doc.text("WORK RECEIPT", 20, 25);
  
  doc.setFontSize(12);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(100, 100, 100);
  doc.text("Professional Service Documentation", 20, 32);
  
  // Receipt number box
  doc.setDrawColor(200, 200, 200);
  doc.setFillColor(245, 245, 245);
  doc.roundedRect(140, 15, 50, 20, 3, 3, 'FD');
  doc.setTextColor(60, 60, 60);
  doc.setFontSize(8);
  doc.text("Receipt #", 145, 22);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(9);
  doc.text(receiptNumber, 145, 28);
  
  // Service information
  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  doc.setTextColor(80, 80, 80);
  
  let yPos = 50;
  
  // Left column
  doc.text("SERVICE DATE", 20, yPos);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(40, 40, 40);
  doc.text(serviceDate, 20, yPos + 6);
  
  doc.setFont("helvetica", "bold");
  doc.setTextColor(80, 80, 80);
  doc.text("CLIENT NAME", 20, yPos + 20);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(40, 40, 40);
  doc.text(client, 20, yPos + 26);
  
  // Right column
  doc.setFont("helvetica", "bold");
  doc.setTextColor(80, 80, 80);
  doc.text("SERVICE PROVIDER", 110, yPos);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(40, 40, 40);
  doc.text("Professional Services", 110, yPos + 6);
  
  doc.setFont("helvetica", "bold");
  doc.setTextColor(80, 80, 80);
  doc.text("STATUS", 110, yPos + 20);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(34, 197, 94);
  doc.text("Completed", 110, yPos + 26);
  
  // Divider line
  yPos += 40;
  doc.setDrawColor(220, 220, 220);
  doc.setLineWidth(0.5);
  for (let x = 20; x < 190; x += 3) {
    doc.line(x, yPos, x + 1.5, yPos);
  }
  
  // Service details
  yPos += 15;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  doc.setTextColor(80, 80, 80);
  doc.text("SERVICE TITLE", 20, yPos);
  
  doc.setFont("helvetica", "bold");
  doc.setFontSize(14);
  doc.setTextColor(40, 40, 40);
  yPos += 8;
  doc.text(title, 20, yPos);
  
  yPos += 15;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  doc.setTextColor(80, 80, 80);
  doc.text("WORK DESCRIPTION", 20, yPos);
  
  // Description box
  yPos += 5;
  doc.setFillColor(248, 248, 248);
  doc.setDrawColor(230, 230, 230);
  doc.roundedRect(20, yPos, 170, 25, 2, 2, 'FD');
  
  yPos += 8;
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(60, 60, 60);
  const splitDesc = doc.splitTextToSize(desc, 160);
  doc.text(splitDesc, 25, yPos);
  
  yPos += Math.max(25, splitDesc.length * 4) + 10;
  
  // Add image if available
  if(imageData){
    // Another divider
    doc.setDrawColor(220, 220, 220);
    doc.setLineWidth(0.5);
    for (let x = 20; x < 190; x += 3) {
      doc.line(x, yPos, x + 1.5, yPos);
    }
    
    yPos += 15;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(10);
    doc.setTextColor(80, 80, 80);
    doc.text("PHOTOGRAPHIC EVIDENCE", 20, yPos);
    
    yPos += 5;
    // Add image
    try {
      doc.addImage(imageData, 'JPEG', 20, yPos, 170, 80);
      yPos += 85;
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8);
      doc.setTextColor(120, 120, 120);
      doc.text("Documentation of completed work", 20, yPos);
      yPos += 10;
    } catch (e) {
      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.setTextColor(120, 120, 120);
      doc.text("Image could not be added to PDF", 20, yPos);
      yPos += 10;
    }
  }
  
  // Final divider
  doc.setDrawColor(220, 220, 220);
  doc.setLineWidth(0.5);
  for (let x = 20; x < 190; x += 3) {
    doc.line(x, yPos, x + 1.5, yPos);
  }
  
  // Footer
  yPos += 15;
  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.setTextColor(120, 120, 120);
  const footerText = "Thank you for choosing our professional services";
  const footerWidth = doc.getTextWidth(footerText);
  doc.text(footerText, (210 - footerWidth) / 2, yPos);
  
  yPos += 8;
  const qualityText = "Quality • Reliability • Excellence";
  const qualityWidth = doc.getTextWidth(qualityText);
  doc.text(qualityText, (210 - qualityWidth) / 2, yPos);
  
  yPos += 12;
  doc.setFontSize(7);
  const disclaimerText = "This receipt serves as proof of service completion and quality assurance.";
  const disclaimerWidth = doc.getTextWidth(disclaimerText);
  doc.text(disclaimerText, (210 - disclaimerWidth) / 2, yPos);

  const blob = doc.output("blob");
  const file = new File([blob], `receipt-${receiptNumber}.pdf`, { type: "application/pdf" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    await navigator.share({
      title: "Professional Work Receipt",
      text: `Work receipt for ${client} - ${title}`,
      files: [file]
    });
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `receipt-${receiptNumber}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
  }
}

// Add some nice animations
document.addEventListener('DOMContentLoaded', function() {
  const inputs = document.querySelectorAll('input, textarea');
  inputs.forEach(input => {
    input.addEventListener('focus', function() {
      this.parentElement.classList.add('ring-2', 'ring-blue-500');
    });
    input.addEventListener('blur', function() {
      this.parentElement.classList.remove('ring-2', 'ring-blue-500');
    });
  });
});
</script>

</body>
</html>
